openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: brands
    description: Brand operations
  - name: visits
    description: Visit operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      responses:
        "200":
          description: Users returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Validation failed
        "409":
          description: Duplicate unique value
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by id
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateInput"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Validation failed
        "404":
          description: User not found
        "409":
          description: Duplicate unique value
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found
  /brands:
    get:
      operationId: listBrands
      tags: [brands]
      summary: Get all brands
      description: Returns all brands for frontend dropdowns.
      responses:
        "200":
          description: Brands returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandListResponse"
    post:
      operationId: createBrand
      tags: [brands]
      summary: Add a new brand
      description: "Manager-only endpoint. Send x-user-role: manager."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandInput"
      responses:
        "201":
          description: Brand created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandResponse"
        "403":
          description: Manager role required
        "409":
          description: Brand already exists
  /visits:
    post:
      operationId: createVisit
      tags: [visits]
      summary: Add visit with brands used
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVisitInput"
      responses:
        "201":
          description: Visit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVisitResponse"
        "400":
          description: Validation failed
components:
  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        mobile:
          type: string
        role:
          type: string
        userId:
          type: string
        password:
          type: string
      required:
        - id
        - name
        - mobile
        - role
        - userId
        - password
    UserInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        mobile:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        userId:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
        - name
        - mobile
        - role
        - userId
        - password
    UserUpdateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        mobile:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        userId:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      minProperties: 1
    UserResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"
      required:
        - data
    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
      required:
        - data
    Brand:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
    BrandInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required:
        - name
    BrandResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: "#/components/schemas/Brand"
      required:
        - message
        - data
    BrandListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Brand"
      required:
        - data
    BrandUsedInput:
      type: object
      properties:
        brand_id:
          type: integer
          minimum: 1
        custom_brand_name:
          type: string
          minLength: 1
      minProperties: 1
    CreateVisitInput:
      type: object
      properties:
        user_id:
          type: integer
          minimum: 1
        customer_id:
          type: integer
          minimum: 1
        area:
          type: string
        site_stage:
          type: string
        feedback:
          type: string
        visit_date:
          type: string
          format: date
        visit_time:
          type: string
        notes:
          type: string
        image_url:
          type: string
        brands_used:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/BrandUsedInput"
      required:
        - user_id
        - customer_id
        - visit_date
        - visit_time
        - brands_used
    Visit:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        customerId:
          type: integer
        area:
          type: string
        siteStage:
          type: string
        feedback:
          type: string
        visitDate:
          type: string
        visitTime:
          type: string
        notes:
          type: string
        imageUrl:
          type: string
      required:
        - id
        - userId
        - customerId
        - visitDate
        - visitTime
    VisitBrand:
      type: object
      properties:
        id:
          type: integer
        visitId:
          type: integer
        brandId:
          type: integer
        customBrandName:
          type: string
      required:
        - id
        - visitId
    CreateVisitResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
          properties:
            visit:
              $ref: "#/components/schemas/Visit"
            brandsUsed:
              type: array
              items:
                $ref: "#/components/schemas/VisitBrand"
          required:
            - visit
            - brandsUsed
      required:
        - message
        - data

