databases:
  - name: sales-db
    plan: free
    databaseName: salesdb
    user: salesapp

services:
  - type: web
    name: sales-app
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/sales-app run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sales-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
