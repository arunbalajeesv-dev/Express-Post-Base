services:
  - type: web
    name: express-post-api
    env: node
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install --frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/sales-app run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps --dns-result-order=ipv4first ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
